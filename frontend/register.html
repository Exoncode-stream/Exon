<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create an account on the Exon hub." />
    <title>Register — Exon</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main>
      <h1>register</h1>

      <form id="register-form">
        <p class="form-group">
          <label for="username">Username (min 3 chars)</label>
          <input type="text" id="username" name="username" placeholder="john_doe" required minlength="3" />
        </p>

        <p class="form-group">
          <label for="password">Password (min 5 chars)</label>
          <input type="password" id="password" name="password" required minlength="5" />
        </p>

        <button type="submit">Register</button>
      </form>

      <output id="message"></output>

      <p class="form-alt-link">
        <a href="login.html" class="btn-link">Already have an account? Login here</a>
      </p>
    </main>

    <script src="scripts/register.js"></script>
  </body>
</html>
