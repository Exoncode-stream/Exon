<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin panel — Add a new video to the Exon hub." />
    <title>Admin — Exon</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main>
      <h1>add-video</h1>

      <form id="add-video-form">
        <p class="form-group">
          <label for="title">Video Title</label>
          <input type="text" id="title" name="title" placeholder="My awesome tutorial" required />
        </p>

        <p class="form-group">
          <label for="youtube_id">YouTube URL or ID</label>
          <input type="text" id="youtube_id" name="youtube_id" placeholder="https://youtube.com/watch?v=..." required />
        </p>

        <p class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" placeholder="Web development" required />
        </p>

        <button type="submit">Add Video</button>
      </form>

      <output id="message-video"></output>

      <br><br>
      <h1>add-article</h1>
      <form id="add-article-form">
        <p class="form-group">
          <label for="article_title">Article Title</label>
          <input type="text" id="article_title" name="title" placeholder="Introduction to React" required />
        </p>

        <p class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" rows="6" style="width: 100%; padding: 10px; font-family: var(--font-mono); font-size: 0.9rem; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);" placeholder="Write your article content here..." required></textarea>
        </p>

        <button type="submit">Add Article</button>
      </form>

      <output id="message-article"></output>
    </main>

    <script src="scripts/admin.js"></script>
  </body>
</html>
