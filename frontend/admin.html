<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin panel — Add a new video to the Exon hub." />
    <title>Admin — Exon</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main>
      <h1>add-video</h1>

      <form id="add-video-form">
        <p class="form-group">
          <label for="title">Video Title</label>
          <input type="text" id="title" name="title" placeholder="My awesome tutorial" required />
        </p>

        <p class="form-group">
          <label for="youtube_id">YouTube URL or ID</label>
          <input type="text" id="youtube_id" name="youtube_id" placeholder="https://youtube.com/watch?v=..." required />
        </p>

        <p class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" placeholder="Web development" required />
        </p>

        <button type="submit">Add Video</button>
      </form>

      <output id="message"></output>
    </main>

    <script src="scripts/admin.js"></script>
  </body>
</html>
